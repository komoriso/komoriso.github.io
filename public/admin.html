<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レーベル管理 | New Shinsho Books</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container animate-fade-in">
        <header>
            <div class="logo">
                <h1>対象レーベル管理</h1>
            </div>
            <nav class="nav-links">
                <a href="/index.html">← 一覧へ戻る</a>
            </nav>
        </header>

        <div id="admin-content">
            <div class="admin-panel">
                <h2>新規レーベル追加</h2>
                <form id="add-label-form">
                    <div class="form-group">
                        <label for="new-name">レーベル名</label>
                        <input type="text" id="new-name" required placeholder="例: 岩波新書">
                    </div>
                    <div class="form-group">
                        <label for="new-url">取得元URL</label>
                        <input type="url" id="new-url" required placeholder="https://...">
                    </div>
                    <button type="submit">追加する</button>
                </form>
            </div>

            <div class="admin-panel">
                <h2>登録済みレーベル一覧</h2>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>レーベル名</th>
                                <th>取得元URL</th>
                                <th>状態</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="label-table-body">
                            <!-- レーベル行をここに挿入 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script src="/js/main.js"></script>
</body>
</html>
