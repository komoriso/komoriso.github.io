<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 | komoriso.github.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="admin" data-api-base="https://xin-kan-lan.onrender.com">
  <div class="page-shell">
    <header class="hero hero-compact">
      <p class="eyebrow">Admin</p>
      <div class="hero-row">
        <div>
          <h1>レーベル管理</h1>
          <p class="hero-copy">レーベルの追加、削除、有効化・無効化を行います。URL は参考リンクとして保持します。</p>
        </div>
        <nav class="nav-links">
          <a href="/index.html">一覧へ戻る</a>
        </nav>
      </div>
    </header>

    <main class="admin-layout">
      <section class="panel">
        <h2>新しいレーベルを追加</h2>
        <form id="add-label-form" class="stack">
          <label class="field">
            <span>レーベル名</span>
            <input type="text" id="new-name" required placeholder="例: 岩波新書">
          </label>
          <label class="field">
            <span>参考URL</span>
            <input type="url" id="new-url" required placeholder="https://...">
          </label>
          <button type="submit">追加する</button>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>登録済みレーベル</h2>
          <p id="admin-status">読み込み中...</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>レーベル</th>
                <th>参考URL</th>
                <th>状態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="label-table-body"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
