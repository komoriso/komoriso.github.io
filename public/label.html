<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レーベル詳細 | New Shinsho Books</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container animate-fade-in">
        <header>
            <div class="logo">
                <h1 id="label-name">レーベル詳細</h1>
            </div>
            <nav class="nav-links">
                <a href="/index.html">← 一覧へ戻る</a>
                <a href="/admin.html">管理ページ</a>
            </nav>
        </header>

        <div class="meta-container">
            <div class="meta-info" id="date-range">
                読み込み中...
            </div>

        <div id="loading" class="loading">新刊情報を取得しています</div>

    <script src="/js/main.js"></script>
