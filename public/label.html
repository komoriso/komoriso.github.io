<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>レーベル別一覧 | komoriso.github.io</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="label" data-api-base="https://xin-kan-lan.onrender.com">
  <div class="page-shell">
    <header class="hero hero-compact">
      <p class="eyebrow">Label View</p>
      <div class="hero-row">
        <div>
          <h1 id="label-name">レーベル別一覧</h1>
          <p class="hero-copy">選択したレーベルの新刊だけを表示します。</p>
        </div>
        <nav class="nav-links">
          <a href="/index.html">一覧へ戻る</a>
          <a href="/admin.html">管理画面</a>
        </nav>
      </div>
      <div class="meta-panel">
        <p id="date-range">読み込み中...</p>
      </div>
    </header>

    <main>
      <section id="loading" class="status-panel">レーベル情報を読み込んでいます...</section>
      <section id="empty-state" class="status-panel" hidden>
        <h2>このレーベルには対象期間の新刊がありません。</h2>
        <p>次回更新後にあらためて表示されます。</p>
      </section>
      <section id="book-container" class="book-grid" hidden></section>
    </main>
  </div>

  <script src="/js/main.js"></script>
</body>
</html>
